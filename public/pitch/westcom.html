<html lang="en" data-theme="light">
<head>

<title>Trixode Studios — Westcom follow-up brief (May 2026)</title>

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #fafaf7;
  --fg: #0a0a0a;
  --accent: #2563eb;
  --emerald: #047857;
  --amber: #b45309;
  --purple: #6d28d9;
  --cyan: #0e7490;
  --border: rgba(10,10,10,0.10);
  --border-hi: rgba(10,10,10,0.18);
  --card-bg: #ffffff;
  --soft: rgba(10,10,10,0.025);
  --muted: rgba(10,10,10,0.62);
  --dim: rgba(10,10,10,0.42);
  --card-shadow: 0 1px 2px rgba(10,10,10,0.04), 0 12px 32px rgba(10,10,10,0.05);
  --logo-filter: none;
  --sg: 'Space Grotesk', system-ui, sans-serif;
  --inter: 'Inter', system-ui, sans-serif;
  --mono: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace;
}
[data-theme="dark"] {
  --bg: #060606;
  --fg: #ffffff;
  --accent: #60a5fa;
  --emerald: #34d399;
  --amber: #fbbf24;
  --purple: #a78bfa;
  --cyan: #22d3ee;
  --border: rgba(255,255,255,0.10);
  --border-hi: rgba(255,255,255,0.20);
  --card-bg: rgba(255,255,255,0.04);
  --soft: rgba(255,255,255,0.04);
  --muted: rgba(255,255,255,0.65);
  --dim: rgba(255,255,255,0.40);
  --card-shadow: 0 1px 2px rgba(0,0,0,0.30), 0 12px 36px rgba(0,0,0,0.40), inset 0 1px 0 rgba(255,255,255,0.05);
  --logo-filter: invert(1);
}
@page { size: A4; margin: 20mm; }
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
html { background: var(--bg); scroll-behavior: smooth; }
html, body { color: var(--fg); font-family: var(--inter); font-size: 18px; line-height: 1.65; -webkit-font-smoothing: antialiased; transition: background 0.25s ease, color 0.25s ease; }
body {
  background-image: linear-gradient(var(--grid) 1px, transparent 1px),
                    linear-gradient(90deg, var(--grid) 1px, transparent 1px);
  background-size: 120px 120px;
}

.section {
  width: 100%;
  background: transparent;
  padding: 96px 0;
  border-bottom: 1px solid var(--border);
}
.section:last-of-type { border-bottom: none; padding-bottom: 128px; }
.section:first-of-type { padding-top: 128px; }
.inner {
  max-width: 1080px;
  margin: 0 auto;
  padding: 0 56px;
}

.eyebrow {
  display:inline-flex; align-items:center; gap:10px;
  padding:8px 18px; border:1px solid var(--border-hi); border-radius:100px;
  font-family:var(--inter); font-size:13px; font-weight:500;
  letter-spacing:0.14em; text-transform:uppercase; color:var(--muted);
  background: var(--card-bg);
}
.dot { width:6px; height:6px; border-radius:50%; background:var(--accent); display:inline-block; }

.d1 { font-family:var(--sg); font-weight:300; font-size:60px; line-height:1.1; letter-spacing:-0.022em; color:var(--fg); }
.h2 { font-family:var(--sg); font-weight:400; font-size:40px; line-height:1.2; letter-spacing:-0.018em; color:var(--fg); }
.kicker { font-family:var(--inter); font-size:13px; font-weight:600; letter-spacing:0.16em; text-transform:uppercase; color:var(--accent); margin-bottom:18px; }
.body { font-family:var(--inter); font-weight:400; font-size:19px; line-height:1.7; color:var(--muted); }
.body strong { color:var(--fg); font-weight:600; }
.lead { font-family:var(--inter); font-weight:400; font-size:22px; line-height:1.55; color:var(--muted); }
.lead strong { color:var(--fg); font-weight:500; }

.brand-logo { display: flex; align-items: center; gap: 16px; width: fit-content; }
.brand-logo svg { width: 44px; height: 44px; flex-shrink: 0; color: var(--accent); display: block; }
.brand-logo .wordmark { font-family: var(--sg); font-size: 30px; font-weight: 500; color: var(--fg); letter-spacing: -0.01em; line-height: 1; }
.rule { width:64px; height:2px; background:var(--accent); border-radius:1px; }

.card {
  background: var(--card-bg);
  border: 1px solid var(--border);
  border-radius: 14px;
  box-shadow: var(--card-shadow);
  padding: 36px 38px;
}
.callout {
  background: var(--soft);
  border: 1px solid var(--border);
  border-left: 3px solid var(--accent);
  border-radius: 10px;
  padding: 28px 32px;
}
.callout p { font-family:var(--inter); font-size:19px; color:var(--fg); line-height:1.65; font-weight: 400; }
.callout p .muted { color: var(--muted); }
.callout .src { display:block; margin-top:10px; font-size:14px; color:var(--dim); }

ul.bullets { list-style: none; padding: 0; margin: 32px 0 0; display:flex; flex-direction:column; gap:18px; }
ul.bullets li { padding-left: 28px; position: relative; font-family:var(--inter); font-size:19px; line-height:1.65; color: var(--muted); }
ul.bullets li::before { content:''; position:absolute; left:0; top:13px; width:8px; height:8px; border-radius:50%; background: var(--accent); }
ul.bullets li strong { color: var(--fg); font-weight: 600; }

.theme-toggle {
  position: fixed; top: 24px; right: 24px; z-index: 9999;
  width: 44px; height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border-hi);
  background: var(--card-bg);
  color: var(--fg);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer;
  box-shadow: var(--card-shadow);
  transition: transform 0.2s ease;
}
.theme-toggle:hover { transform: scale(1.05); }
.theme-toggle svg { width: 18px; height: 18px; }
[data-theme="light"] .icon-moon { display: block; }
[data-theme="light"] .icon-sun { display: none; }
[data-theme="dark"] .icon-moon { display: none; }
[data-theme="dark"] .icon-sun { display: block; }
@media print { .theme-toggle { display: none !important; } }

.screenshot {
  background: var(--soft);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  aspect-ratio: 9 / 19.5;
  display: flex; align-items: center; justify-content: center;
  position: relative;
  box-shadow: var(--card-shadow);
}
.screenshot img { width: 100%; height: 100%; object-fit: cover; display: block; }
.screenshot .placeholder {
  font-family: var(--mono); font-size: 13px; color: var(--dim); text-align: center; padding: 24px;
}
.screenshot .placeholder strong { display:block; font-family:var(--sg); font-size:17px; color:var(--fg); margin-bottom:6px; font-weight:500; }
.caption { font-family:var(--inter); font-size:15px; color:var(--muted); margin-top:14px; line-height:1.55; }
.caption strong { color: var(--fg); font-weight: 600; }

a.link { color: var(--accent); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color 0.15s ease; }
a.link:hover { border-color: var(--accent); }

/* Team cards */
.team-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:24px; margin-top:56px; }
.team-card {
  background: var(--card-bg); border:1px solid var(--border); border-radius:18px;
  padding:48px 32px 32px; box-shadow: var(--card-shadow);
  text-align:center; display:flex; flex-direction:column; align-items:center;
}
.avatar {
  width:88px; height:88px; border-radius:50%;
  background: var(--fg); color: var(--bg);
  display:flex; align-items:center; justify-content:center;
  font-family: var(--sg); font-size:26px; font-weight:500; letter-spacing:0.02em;
  margin-bottom:24px; border:1px solid var(--border);
}
.team-name { font-family: var(--sg); font-size:22px; font-weight:500; color: var(--fg); margin-bottom:8px; }
.team-role { font-family: var(--inter); font-size:11px; font-weight:600; letter-spacing:0.18em; text-transform:uppercase; color: var(--dim); margin-bottom:22px; }
.team-tagline { font-family: var(--inter); font-size:16px; color: var(--muted); line-height:1.55; margin-bottom:22px; }
.team-creds { list-style:none; padding:0; display:flex; flex-direction:column; gap:6px; margin-bottom:28px; }
.team-creds li { font-family: var(--inter); font-size:13px; color: var(--dim); line-height:1.5; }
.team-linkedin { display: none !important; }

/* Confidential badge */
.confidential {
  position: fixed; top: 24px; left: 24px; z-index: 9999;
  padding: 7px 14px; border-radius: 100px;
  background: rgba(185, 28, 28, 0.08);
  border: 1px solid rgba(185, 28, 28, 0.32);
  font-family: var(--inter); font-size: 11px; font-weight: 600;
  letter-spacing: 0.18em; text-transform: uppercase;
  color: #b91c1c;
}
[data-theme="dark"] .confidential {
  background: rgba(248, 113, 113, 0.12);
  border-color: rgba(248, 113, 113, 0.40);
  color: #f87171;
}
@media print { .confidential { position: absolute; } }
</style>
</head>

  function b64ToBytes(b64) {
    var bin = atob(b64);
    var bytes = new Uint8Array(bin.length);
    for (var i = 0; i < bin.length; i++) bytes[i] = bin.charCodeAt(i);
    return bytes;
  }

  async function decrypt(password) {
    var enc = new TextEncoder();
    var keyMaterial = await crypto.subtle.importKey(
      "raw", enc.encode(password), "PBKDF2", false, ["deriveKey"]
    );
    var key = await crypto.subtle.deriveKey(
      { name: "PBKDF2", salt: b64ToBytes(SALT), iterations: 250000, hash: "SHA-256" },
      keyMaterial,
      { name: "AES-GCM", length: 256 },
      false,
      ["decrypt"]
    );
    var plain = await crypto.subtle.decrypt(
      { name: "AES-GCM", iv: b64ToBytes(IV) },
      key,
      b64ToBytes(CIPHERTEXT)
    );
    return new TextDecoder().decode(plain);
  }

  function reExecuteScripts(container) {
    container.querySelectorAll('script').forEach(function(oldScript) {
      var newScript = document.createElement('script');
      if (oldScript.src) {
        newScript.src = oldScript.src;
      } else {
        newScript.textContent = oldScript.textContent;
      }
      oldScript.parentNode.replaceChild(newScript, oldScript);
    });
  }

  document.addEventListener('DOMContentLoaded', function() {
    var form = document.getElementById('gate-form');
    var input = document.getElementById('gate-input');
    var submit = document.getElementById('gate-submit');
    var errorEl = document.getElementById('gate-error');
    var gate = document.getElementById('gate-wrap');
    var content = document.getElementById('trx-content');

    form.addEventListener('submit', async function(e) {
      e.preventDefault();
      submit.disabled = true;
      errorEl.textContent = '';
      try {
        var pwd = input.value;
        var decryptedHtml = await decrypt(pwd);
        content.innerHTML = decryptedHtml;
        reExecuteScripts(content);
        gate.remove();
      } catch (err) {
        errorEl.textContent = 'Incorrect password. Try again.';
        submit.disabled = false;
        input.focus();
        input.select();
      }
    });
  });
})();
